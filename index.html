<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Site Title</title>
  
  <style>
    body {
      /* Point to your image file location */
      background-image: url('background.png'); 
      
      /* Stretches the image to cover the entire window */
      background-size: cover; 
      
      /* Centers the image on screen */
      background-position: center; 
      
      /* Prevents the image from repeating as a tile */
      background-repeat: no-repeat; 
      
      /* Keeps the background fixed in place when scrolling */
      background-attachment: fixed; 
      
      /* Fallback background color if the image takes time to load */
      background-color: #121212; 
      
      /* Make sure text readable on dark backgrounds */
      color: #ffffff; 
      margin: 0;
      font-family: sans-serif;
    }
  </style>
</head>
<body>

  <h1>Welcome to my site</h1>
  <p>Your content goes here!</p>

</body>
</html>
